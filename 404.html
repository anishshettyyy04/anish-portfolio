<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Anish Shetty S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0D;
    --surface:#13131A;
    --line:#26262F;
    --text:#F2F0EB;
    --text-muted:#8B8B96;
    --accent:#FF6B1A;
    --accent-2:#FFB454;
  }
  *{margin:0;box-sizing:border-box;}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .wrap{text-align:center;max-width:480px;}
  .code{
    font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent-2);
    letter-spacing:0.08em;margin-bottom:18px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:64px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1;margin-bottom:18px;
  }
  p{font-size:15px;color:var(--text-muted);line-height:1.7;margin-bottom:32px;}
  .btn{
    display:inline-block;font-size:14px;font-weight:500;padding:13px 28px;
    border-radius:999px;background:var(--accent);color:#0A0A0D;text-decoration:none;
    transition:background .2s;
  }
  .btn:hover{background:var(--accent-2);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">// 404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist — maybe a typo in the link, or something that moved. Let's get you back to the actual site.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</body>
</html>
